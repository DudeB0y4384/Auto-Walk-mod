name: Build Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'

      - name: Compilar mod
        working-directory: autowalk-mod
        run: gradle build

      - name: Subir el .jar como artifact
        uses: actions/upload-artifact@v4
        with:
          name: autowalk-mod-jar
          path: autowalk-mod/build/libs/*.jar
